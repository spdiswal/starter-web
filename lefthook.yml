# Define Git hooks.
# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  commands:
    pnpm-fmt:
      run: pnpm fmt
      stage_fixed: true

post-checkout:
  commands:
    pnpm-install-on-lockfile-change:
      run: |
        PNPM_LOCK_CHANGED=$(git diff --name-only HEAD@{1} HEAD -- | grep 'pnpm-lock.yaml')
        if [ ! -z "$PNPM_LOCK_CHANGED" ]; then
          echo "Changes detected in pnpm-lock.yaml. Running pnpm install."
          pnpm install
        else
          echo "No changes detected in pnpm-lock.yaml. Skipping pnpm install."
        fi
      skip:
        - merge
        - rebase

skip_output:
  - meta
  - summary
